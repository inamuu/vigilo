version: 2

project_name: vigilo

builds:
  - id: vigilo
    main: ./cmd/vigilo
    binary: vigilo
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - name: vigilo
    directory: Formula
    repository:
      owner: inamuu
      # Homebrew tap repo: `brew install inamuu/tap/vigilo` -> `inamuu/homebrew-tap`
      name: homebrew-tap
      branch: main
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    commit_author:
      name: github-actions[bot]
      email: 41898282+github-actions[bot]@users.noreply.github.com
    homepage: "https://github.com/inamuu/vigilo"
    description: "Watch command output and notify on pattern matches or exits."
    license: "MIT"
    skip_upload: "{{ or .IsSnapshot (eq .Env.HOMEBREW_TAP_GITHUB_TOKEN \"\") }}"
    caveats: |
      `vigilo --notify osascript` requires macOS.
      `vigilo --notify slack` requires `~/.config/vigilo/config.yaml`.
    install: |
      bin.install "vigilo"
    test: |
      system "#{bin}/vigilo", "--version"
